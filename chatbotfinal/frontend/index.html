<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant d'analyse du tourisme</title>
  <meta name="description" content="Assistant d'analyse touristique" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --panel-soft: #f9fbfc;
      --text: #152233;
      --muted: #647184;
      --line: #dde5ed;
      --brand: #0b4f71;
      --brand-2: #0f766e;
      --gold: #a97717;
      --danger: #b42318;
      --ok: #047857;
      --shadow: 0 18px 42px rgba(15, 23, 42, .08);
      --radius: 8px;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; }
    a { color: var(--brand); }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-rows: 68px 1fr;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(10px);
      z-index: 5;
    }
    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand .ministry { height: 46px; max-width: min(460px, 44vw); object-fit: contain; }
    .product {
      min-width: 190px;
      padding-left: 16px;
      border-left: 1px solid var(--line);
    }
    .product h1 {
      margin: 0;
      color: var(--brand);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0;
    }
    .product p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: .76rem;
      line-height: 1.25;
    }
    .status {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: .72rem;
      font-weight: 750;
      white-space: nowrap;
    }
    .pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--gold);
    }
    .pill.ok::before { background: var(--ok); }
    .pill.warn::before { background: var(--danger); }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 16px 20px 18px;
      overflow: hidden;
    }

    .sidebar {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .side-top {
      padding: 13px;
      border-bottom: 1px solid var(--line);
    }
    .new-chat {
      width: 100%;
      height: 38px;
      border-radius: 7px;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      transition: transform .16s ease, background .16s ease;
    }
    .new-chat:hover { transform: translateY(-1px); background: #083e59; }
    .side-label {
      margin: 14px 2px 8px;
      color: var(--muted);
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 800;
    }
    .prompt-list { display: grid; gap: 7px; }
    .prompt {
      width: 100%;
      text-align: left;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--brand);
      font-size: .78rem;
      font-weight: 680;
      line-height: 1.35;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }
    .prompt:hover { background: #f2f8fa; border-color: #bfd5df; transform: translateY(-1px); }
    .conv-list {
      min-height: 0;
      overflow: auto;
      padding: 9px;
    }
    .conv {
      width: 100%;
      text-align: left;
      padding: 10px;
      border-radius: 7px;
      background: transparent;
      color: var(--text);
      margin-bottom: 5px;
      transition: background .16s ease;
    }
    .conv:hover { background: #f6f9fb; }
    .conv.active { background: #eaf5f7; }
    .conv-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: .82rem;
      font-weight: 750;
    }
    .conv-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: .72rem;
    }
    .side-foot {
      padding: 12px 13px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: .74rem;
      line-height: 1.45;
      background: var(--panel-soft);
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .chat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .chat-head h2 {
      margin: 0;
      font-size: 1.04rem;
      letter-spacing: 0;
    }
    .chat-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .82rem;
    }
    .head-actions { display: flex; align-items: center; gap: 7px; }
    .icon-btn, .mini-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--brand);
      font-size: .82rem;
      font-weight: 800;
      transition: background .16s ease, transform .16s ease, border-color .16s ease;
    }
    .icon-btn:hover, .mini-btn:hover { background: #f2f8fa; border-color: #bed3dd; transform: translateY(-1px); }

    .messages {
      min-height: 0;
      overflow: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 17px;
      background: linear-gradient(#fff, #fbfcfd);
      scroll-behavior: smooth;
    }
    .empty {
      width: min(760px, 100%);
      margin: auto;
      display: grid;
      gap: 16px;
      align-content: center;
      color: var(--text);
      animation: rise .28s ease both;
    }
    .empty h2 { margin: 0; font-size: 1.45rem; color: var(--brand); letter-spacing: 0; }
    .empty p { margin: 0; color: var(--muted); line-height: 1.55; }
    .empty-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }

    .msg {
      width: min(980px, 92%);
      display: grid;
      gap: 8px;
      animation: rise .24s ease both;
    }
    .msg.user { align-self: flex-end; justify-items: end; }
    .msg.assistant { align-self: flex-start; }
    .msg-shell {
      display: grid;
      gap: 7px;
      max-width: 100%;
    }
    .bubble {
      position: relative;
      max-width: 100%;
      border-radius: var(--radius);
      padding: 13px 14px;
      line-height: 1.55;
      font-size: .92rem;
      overflow-wrap: anywhere;
    }
    .user .bubble { background: var(--brand); color: #fff; }
    .assistant .bubble { background: #fff; border: 1px solid var(--line); }
    .bubble h1, .bubble h2, .bubble h3 {
      margin: 15px 0 8px;
      color: var(--brand);
      letter-spacing: 0;
      line-height: 1.25;
    }
    .bubble h1 { font-size: 1.12rem; }
    .bubble h2 { font-size: 1rem; }
    .bubble h3 { font-size: .94rem; }
    .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child { margin-top: 0; }
    .bubble p { margin: 0 0 9px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 8px 0 10px; padding-left: 20px; }
    .bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: .84rem;
      display: block;
      overflow-x: auto;
    }
    .bubble th, .bubble td { border: 1px solid var(--line); padding: 7px 8px; text-align: left; }
    .bubble th { background: #f3f7f9; color: var(--brand); }

    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: .78;
      transition: opacity .16s ease;
    }
    .msg:hover .actions { opacity: 1; }
    .user .actions { justify-content: flex-end; }
    .action-btn {
      min-width: 30px;
      height: 28px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--brand);
      font-weight: 850;
      line-height: 1;
    }
    .action-btn:hover { background: #eef7f8; }

    .edit-box {
      width: min(720px, 100%);
      display: grid;
      gap: 8px;
    }
    .edit-box textarea {
      width: 100%;
      min-height: 94px;
      resize: vertical;
    }
    .edit-actions { display: flex; justify-content: flex-end; gap: 8px; }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }
    .chip, .source-chip, .confidence {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8fbff;
      color: var(--brand);
      text-decoration: none;
      font-size: .72rem;
      font-weight: 760;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .confidence { color: var(--ok); background: #ecfdf5; }
    .error-chip { color: var(--danger); background: #fff5f4; }

    .charts {
      width: min(1120px, 100%);
      display: grid;
      gap: 10px;
    }
    .charts.multi { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .chart-tile {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
      animation: fade .28s ease both;
    }
    .chart-head {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: .74rem;
      font-weight: 800;
    }
    .chart-head a { text-decoration: none; color: var(--brand); }
    .chart-frame {
      width: 100%;
      height: 390px;
      display: block;
      border: 0;
      background: #fff;
    }

    details.trace {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
      padding: 9px 11px;
    }
    details.trace summary {
      cursor: pointer;
      color: var(--muted);
      font-size: .75rem;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .step-list { display: grid; gap: 8px; margin-top: 9px; }
    .step {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 8px;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.35;
    }
    .dot {
      width: 10px;
      height: 10px;
      margin-top: 3px;
      border-radius: 999px;
      background: var(--line);
    }
    .step.done .dot { background: var(--ok); }
    .step.error .dot { background: var(--danger); }
    .step.running .dot {
      background: var(--brand-2);
      animation: pulse 1.2s infinite;
    }
    .step strong { display: block; color: var(--text); font-size: .8rem; }
    .step-dur { font-style: normal; color: var(--muted); font-size: .72rem; margin-left: 6px; }
    .trace-loading {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted); font-size: .82rem; padding: 8px 0;
    }
    .trace-loading .dot { width: 10px; height: 10px; border-radius: 999px; }

    .loading-widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 24px 16px 18px;
      animation: rise .3s ease both;
    }
    .loading-widget svg {
      display: block;
    }
    .loading-label {
      color: var(--muted);
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .01em;
    }
    .loading-timer {
      font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
      font-size: .78rem;
      color: var(--brand-2);
      font-weight: 600;
      opacity: 0;
      animation: fadeTimer .4s ease .6s forwards;
      min-width: 32px;
      text-align: center;
    }
    @keyframes fadeTimer {
      to { opacity: 1; }
    }

    .composer {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 13px;
    }
    .input-wrap {
      display: grid;
      grid-template-columns: 1fr 46px;
      gap: 10px;
      align-items: end;
    }
    textarea {
      min-height: 50px;
      max-height: 160px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 13px;
      outline: none;
      color: var(--text);
      background: #fff;
      line-height: 1.45;
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(11, 79, 113, .10); }
    .send {
      height: 50px;
      border-radius: var(--radius);
      background: var(--brand);
      color: #fff;
      font-size: 1.02rem;
      font-weight: 850;
      transition: transform .16s ease, background .16s ease;
    }
    .send:hover { transform: translateY(-1px); background: #083e59; }
    .send.loading {
      color: transparent;
      position: relative;
      overflow: hidden;
    }
    .send.loading::after {
      content: "";
      position: absolute;
      inset: 15px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.42);
      border-top-color: #fff;
      animation: spin .8s linear infinite;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(460px, calc(100vw - 36px));
      display: none;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: #111827;
      color: #fff;
      font-size: .82rem;
      box-shadow: var(--shadow);
      animation: rise .18s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(15, 118, 110, .30); }
      70% { box-shadow: 0 0 0 8px rgba(15, 118, 110, 0); }
      100% { box-shadow: 0 0 0 0 rgba(15, 118, 110, 0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }

    @media (max-width: 1060px) {
      .shell { grid-template-rows: auto 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .status { justify-content: flex-start; }
      .workspace { grid-template-columns: 1fr; overflow: auto; }
      .sidebar { max-height: 330px; }
      .main { min-height: 72vh; }
      .charts.multi { grid-template-columns: 1fr; }
    }
    @media (max-width: 680px) {
      .topbar { padding: 10px 12px; }
      .brand { width: 100%; justify-content: space-between; gap: 10px; }
      .brand .ministry { max-width: 58vw; }
      .product { min-width: 0; border-left: 0; padding-left: 0; }
      .workspace { padding: 10px; gap: 10px; }
      .messages { padding: 14px; }
      .msg { width: 100%; }
      .empty-grid { grid-template-columns: 1fr; }
      .chat-frame, .chart-frame { height: 320px; }
      .chat-head { align-items: flex-start; }
      .head-actions { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="ministry" src="/assets/logo.png" alt="Royaume du Maroc - Ministère du Tourisme">
        <div class="product">
          <h1>Assistant d'analyse du tourisme</h1>
          <p>KPI Fabric, analyses, veille et recommandations</p>
        </div>
      </div>
      <div class="status" id="statusBar"><span class="pill">Initialisation</span></div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <div class="side-top">
          <button class="new-chat" id="newChatBtn">Nouvelle analyse</button>
          <div class="side-label">Questions exécutives</div>
          <div class="prompt-list" id="promptList"></div>
        </div>
        <div class="conv-list" id="conversationList"></div>
        <div class="side-foot" id="sideFoot">Connexion aux services d'analyse...</div>
      </aside>

      <section class="main">
        <div class="chat-head">
          <div>
            <h2>Assistant d'analyse du tourisme</h2>
            <p>Analyse chiffrée, graphiques interactifs, contexte externe et décisions.</p>
          </div>
          <div class="head-actions">
            <button class="icon-btn" id="refreshBtn" title="Actualiser">↻</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="composer">
          <div class="input-wrap">
            <textarea id="messageInput" placeholder="Ex: Analyse les arrivées 2025 avec deux graphiques et recommandations"></textarea>
            <button class="send" id="sendBtn" aria-label="Envoyer">→</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const API = {
      readiness: '/api/readiness',
      chat: '/api/chat',
      reports: '/api/reports',
      convList: '/api/conversations',
      convNew: '/api/conversations',
      convGet: id => `/api/conversations/${id}`,
      convAct: id => `/api/conversations/${id}/activate`,
      msgEdit: (cid, mid) => `/api/conversations/${cid}/messages/${mid}`,
      msgRetry: (cid, mid) => `/api/conversations/${cid}/messages/${mid}/retry`
    };

    const PROMPTS = [
      'Analyse les arrivées APF 2025 avec deux graphiques et recommandations',
      'Comparer APF et hébergement en 2025 avec graphique',
      'Pourquoi les arrivées de juillet 2025 ont-elles évolué ?',
      'Quels risques géopolitiques peuvent impacter Vision 2030 ?',
      'Quels marchés émetteurs méritent attention ce mois-ci ?'
    ];

    class TourismAnalysisChat {
      constructor() {
        this.conversationId = null;
        this.messages = [];
        this.loading = false;
        this.editingId = null;
        this.progressTimer = null;
      }

      async init() {
        document.getElementById('sendBtn').addEventListener('click', () => this.send());
        document.getElementById('messageInput').addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.send(); }
        });
        document.getElementById('newChatBtn').addEventListener('click', () => this.newConversation());
        document.getElementById('refreshBtn').addEventListener('click', () => this.refresh());
        document.getElementById('promptList').innerHTML = PROMPTS.map(p =>
          `<button class="prompt" onclick="app.ask(${JSON.stringify(p)})">${this.esc(p)}</button>`
        ).join('');
        await Promise.all([this.refreshReadiness(), this.loadConversations()]);
        if (!this.conversationId) await this.newConversation(false);
        this.renderMessages();
      }

      async fetchJson(url, opts = {}) {
        const r = await fetch(url, opts);
        const text = await r.text();
        let payload = {};
        try { payload = text ? JSON.parse(text) : {}; } catch { payload = { error: text }; }
        if (!r.ok) throw new Error(payload.error || `${r.status} ${r.statusText}`);
        return payload;
      }

      async refresh() {
        await Promise.all([this.refreshReadiness(), this.loadConversations()]);
        if (this.conversationId) await this.activateConversation(this.conversationId);
      }

      async refreshReadiness() {
        try {
          const data = await this.fetchJson(API.readiness);
          const pills = [
            ['Fabric', data.fabric?.connected],
            ['Recherche', data.search?.available],
            ['RAG ' + (data.rag?.chunks || 0), data.rag?.available]
          ];
          document.getElementById('statusBar').innerHTML = pills.map(([label, ok]) =>
            `<span class="pill ${ok ? 'ok' : 'warn'}">${this.esc(label)}</span>`
          ).join('');
          document.getElementById('sideFoot').textContent = data.ready
            ? 'Système prêt: Fabric, RAG et recherche disponibles.'
            : `Mode dégradé: ${(data.blockers || []).join(', ') || 'configuration à vérifier'}`;
        } catch (e) {
          document.getElementById('statusBar').innerHTML = '<span class="pill warn">Services indisponibles</span>';
          document.getElementById('sideFoot').textContent = e.message;
        }
      }

      async loadConversations() {
        try {
          const rows = await this.fetchJson(API.convList);
          const list = document.getElementById('conversationList');
          list.innerHTML = rows.map(c => `
            <button class="conv ${c.id === this.conversationId ? 'active' : ''}" onclick="app.activateConversation('${c.id}')">
              <div class="conv-title">${this.esc(c.title)}</div>
              <div class="conv-meta">${c.message_count || 0} messages</div>
            </button>`).join('');
          if (rows[0] && !this.conversationId) {
            this.conversationId = rows[0].id;
            await this.activateConversation(rows[0].id, false);
          }
        } catch {}
      }

      async newConversation(render = true) {
        const conv = await this.fetchJson(API.convNew, { method: 'POST' });
        this.conversationId = conv.id;
        this.messages = [];
        this.editingId = null;
        await this.loadConversations();
        if (render) this.renderMessages();
      }

      async activateConversation(id, render = true) {
        this.conversationId = id;
        await this.fetchJson(API.convAct(id), { method: 'POST' });
        const conv = await this.fetchJson(API.convGet(id));
        this.messages = conv.messages || [];
        this.editingId = null;
        await this.loadConversations();
        if (render) this.renderMessages();
      }

      ask(text) {
        document.getElementById('messageInput').value = text;
        this.send();
      }

      async send() {
        if (this.loading) return;
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        if (!message) return;
        if (!this.conversationId) await this.newConversation(false);
        input.value = '';
        await this.runRequest(() => this.fetchJson(API.chat, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, conversation_id: this.conversationId })
        }), message);
      }

      async editMessage(mid, content) {
        if (this.loading || !content.trim()) return;
        const idx = this.messages.findIndex(m => this.mid(m) === mid);
        if (idx >= 0) {
          this.messages[idx].content = content.trim();
          this.messages = this.messages.slice(0, idx + 1);
        }
        await this.runRequest(() => this.fetchJson(API.msgEdit(this.conversationId, mid), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: content.trim() })
        }), content.trim(), false);
      }

      async retryMessage(mid) {
        if (this.loading) return;
        const idx = this.messages.findIndex(m => this.mid(m) === mid);
        const user = this.relatedUser(idx);
        const userIdx = this.messages.findIndex(m => this.mid(m) === this.mid(user));
        if (userIdx >= 0) this.messages = this.messages.slice(0, userIdx + 1);
        await this.runRequest(() => this.fetchJson(API.msgRetry(this.conversationId, mid), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        }), user?.content || 'Relance', false);
      }

      async runRequest(requestFactory, optimisticText, addGhostUser = true) {
        this.setLoading(true);
        this.editingId = null;
        const ghostUser = { role: 'user', content: optimisticText, message_id: `tmp_u_${Date.now()}` };
        const ghostAssistant = {
          role: 'assistant',
          content: '',
          message_id: `tmp_a_${Date.now()}`,
          status: 'running',
          trace: []
        };
        if (addGhostUser) this.messages.push(ghostUser);
        this.messages.push(ghostAssistant);
        this.renderMessages();
        this.startProgress();
        try {
          const payload = await requestFactory();
          this.conversationId = payload.conversation_id || this.conversationId;
          await this.activateConversation(this.conversationId, false);
          await this.loadConversations();
          this.refreshReadiness();
        } catch (e) {
          ghostAssistant.status = 'error';
          ghostAssistant.content = `Erreur: ${e.message}`;
          ghostAssistant.errors = [{ message: e.message }];
          this.toast(e.message);
        } finally {
          this.stopProgress();
          this.setLoading(false);
          this.renderMessages();
        }
      }

      startProgress() {
        this.stopProgress();
        this.progressStart = Date.now();
        this.progressTimer = setInterval(() => {
          const el = document.getElementById('elapsedTimer');
          if (!el || !this.progressStart) return;
          const sec = Math.floor((Date.now() - this.progressStart) / 1000);
          if (sec < 60) {
            el.textContent = sec + 's';
          } else {
            const m = Math.floor(sec / 60);
            const s = String(sec % 60).padStart(2, '0');
            el.textContent = m + 'm ' + s + 's';
          }
        }, 1000);
      }

      stopProgress() {
        if (this.progressTimer) clearInterval(this.progressTimer);
        this.progressTimer = null;
        this.progressStart = null;
      }

      renderMessages() {
        const el = document.getElementById('messages');
        if (!this.messages.length) {
          el.innerHTML = this.renderEmpty();
          return;
        }
        el.innerHTML = this.messages.map((m, idx) => this.renderMessage(m, idx)).join('');
        el.scrollTop = el.scrollHeight;
      }

      renderEmpty() {
        return `
          <div class="empty">
            <div>
              <h2>Bienvenue</h2>
              <p>Posez une question analytique, demandez plusieurs graphiques, ou relancez une analyse existante depuis un message.</p>
            </div>
            <div class="empty-grid">
              ${PROMPTS.slice(0, 4).map(p => `<button class="prompt" onclick="app.ask(${JSON.stringify(p)})">${this.esc(p)}</button>`).join('')}
            </div>
          </div>`;
      }

      renderMessage(m, idx) {
        const isUser = m.role === 'user';
        const mid = this.mid(m);
        const editing = this.editingId === mid;
        const actionMid = isUser ? mid : this.relatedUser(idx)?.message_id;
        const canFork = Boolean(actionMid) && !this.loading && !String(mid).startsWith('tmp_');
        const rawHtml = m.content ? this.renderMarkdown(m.content) : (m.status === 'running' ? this.renderLoadingSpinner() : '');
        const urls = this.chartUrls(m);
        const hasMarkers = rawHtml.includes('<!-- chart:');
        let bodyHtml;
        if (hasMarkers && urls.length) {
          const parts = rawHtml.split(/<!-- chart:(\d+) -->/);
          bodyHtml = '';
          for (let p = 0; p < parts.length; p++) {
            if (p % 2 === 0) {
              bodyHtml += '<div class="bubble">' + parts[p] + '</div>';
            } else {
              const ci = parseInt(parts[p], 10) - 1;
              if (ci >= 0 && ci < urls.length) {
                bodyHtml += '<div class="chart-tile"><div class="chart-head"><span>Graphique ' + (ci+1) + '</span><a href="' + this.esc(urls[ci]) + '" target="_blank" rel="noopener noreferrer">Ouvrir</a></div><iframe class="chart-frame" src="' + this.esc(urls[ci]) + '" title="Graphique ' + (ci+1) + '" sandbox="allow-scripts allow-same-origin"></iframe></div>';
              }
            }
          }
        } else {
          bodyHtml = '<div class="bubble">' + rawHtml + '</div>' + this.renderCharts(m);
        }
        const meta = !isUser ? this.renderMeta(m, idx) : '';
        const trace = !isUser ? this.renderTrace(m) : '';

        if (editing && actionMid) {
          const user = this.messages.find(x => this.mid(x) === actionMid) || this.relatedUser(idx);
          return `
            <div class="msg user">
              <div class="edit-box">
                <textarea id="edit_${this.esc(actionMid)}">${this.esc(user?.content || '')}</textarea>
                <div class="edit-actions">
                  <button class="mini-btn" onclick="app.cancelEdit()">Annuler</button>
                  <button class="mini-btn" onclick="app.saveEdit('${this.esc(actionMid)}')">Enregistrer</button>
                </div>
              </div>
            </div>`;
        }

        return `
          <div class="msg ${isUser ? 'user' : 'assistant'}">
            <div class="actions">
              <button class="action-btn" title="Modifier" ${canFork ? '' : 'disabled'} onclick="app.beginEdit('${this.esc(actionMid || '')}')">✎</button>
              <button class="action-btn" title="Réessayer" ${canFork ? '' : 'disabled'} onclick="app.retryMessage('${this.esc(actionMid || '')}')">↻</button>
              ${!isUser && m.content ? `<button class="action-btn" title="Rapport" onclick="app.downloadReport(${idx})">⇩</button>` : ''}
            </div>
            <div class="msg-shell">
              ${bodyHtml}
              ${meta}
              ${trace}
            </div>
          </div>`;
      }

      renderCharts(m) {
        const urls = this.chartUrls(m);
        if (!urls.length) return '';
        return `
          <div class="charts ${urls.length > 1 ? 'multi' : ''}">
            ${urls.map((url, i) => `
              <div class="chart-tile">
                <div class="chart-head"><span>Graphique ${i + 1}</span><a href="${this.esc(url)}" target="_blank" rel="noopener noreferrer">Ouvrir</a></div>
                <iframe class="chart-frame" src="${this.esc(url)}" title="Graphique interactif ${i + 1}" sandbox="allow-scripts allow-same-origin"></iframe>
              </div>`).join('')}
          </div>`;
      }

      renderMeta(m, index) {
        const sources = (m.sources || []).slice(0, 10).map(s => {
          const label = s.source || s.title || 'Source';
          return s.url
            ? `<a class="source-chip" href="${this.esc(s.url)}" target="_blank" rel="noopener noreferrer">${this.esc(label)}</a>`
            : `<span class="source-chip">${this.esc(label)}</span>`;
        }).join('');
        const chips = [
          m.agent_name ? `<span class="chip">${this.esc(m.agent_name)}</span>` : '',
          m.run_id ? `<span class="chip">Run ${this.esc(m.run_id)}</span>` : '',
          m.confidence ? `<span class="confidence">Confiance: ${this.esc(m.confidence)}</span>` : '',
          ...(m.errors || []).map(e => `<span class="chip error-chip">${this.esc(e.message || e.error || 'Erreur')}</span>`)
        ].join('');
        return chips || sources ? `<div class="meta-row">${chips}${sources}</div>` : '';
      }

      renderLoadingSpinner() {
        return `<div class="loading-widget">
          <svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <circle cx="30" cy="30" r="24" fill="none" stroke="#dde5ed" stroke-width="2.5"
                    stroke-dasharray="6 4" opacity=".5">
              <animateTransform attributeName="transform" type="rotate"
                                from="0 30 30" to="360 30 30" dur="8s" repeatCount="indefinite"/>
            </circle>
            <circle cx="30" cy="30" r="18" fill="none" stroke="#0b4f71" stroke-width="2"
                    stroke-dasharray="28 85" stroke-linecap="round" opacity=".7">
              <animateTransform attributeName="transform" type="rotate"
                                from="0 30 30" to="360 30 30" dur="1.8s" repeatCount="indefinite"/>
            </circle>
            <g>
              <animateTransform attributeName="transform" type="rotate"
                                from="0 30 30" to="360 30 30" dur="2.4s" repeatCount="indefinite"/>
              <circle cx="30" cy="6" r="3.5" fill="#0f766e">
                <animate attributeName="opacity" values="1;.4;1" dur="2.4s" repeatCount="indefinite"/>
              </circle>
            </g>
            <g>
              <animateTransform attributeName="transform" type="rotate"
                                from="120 30 30" to="480 30 30" dur="2.4s" repeatCount="indefinite"/>
              <circle cx="30" cy="6" r="3" fill="#0b4f71">
                <animate attributeName="opacity" values=".4;1;.4" dur="2.4s" repeatCount="indefinite"/>
              </circle>
            </g>
            <g>
              <animateTransform attributeName="transform" type="rotate"
                                from="240 30 30" to="600 30 30" dur="2.4s" repeatCount="indefinite"/>
              <circle cx="30" cy="6" r="2.5" fill="#0f766e" opacity=".7">
                <animate attributeName="opacity" values=".7;.3;.7" dur="2.4s" repeatCount="indefinite"/>
              </circle>
            </g>
            <circle cx="30" cy="30" r="4" fill="#047857">
              <animate attributeName="r" values="3.5;5;3.5" dur="1.6s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values=".8;1;.8" dur="1.6s" repeatCount="indefinite"/>
            </circle>
          </svg>
          <span class="loading-label">Analyse en cours\u2026</span>
          <span class="loading-timer" id="elapsedTimer">0s</span>
        </div>`;
      }

      renderTrace(m) {
        const trace = m.trace || [];
        if (!trace.length && m.status !== 'running') return '';
        if (m.status === 'running' && !trace.length) {
          return '';
        }
        return `
          <details class="trace">
            <summary>Journal d'analyse</summary>
            <div class="step-list">
              ${trace.map(s => {
                const dur = s.duration_ms ? ` (${Math.round(s.duration_ms)}ms)` : '';
                const detail = s.detail || s.agent || '';
                return `
                <div class="step ${this.esc(s.status || 'done')}">
                  <span class="dot"></span>
                  <span><strong>${this.esc(s.label || s.stage || 'Etape')}</strong>${this.esc(detail)}${dur ? `<em class="step-dur">${this.esc(dur)}</em>` : ''}</span>
                </div>`;
              }).join('')}
            </div>
          </details>`;
      }

      beginEdit(mid) {
        if (!mid || this.loading) return;
        this.editingId = mid;
        this.renderMessages();
      }

      cancelEdit() {
        this.editingId = null;
        this.renderMessages();
      }

      saveEdit(mid) {
        const el = document.getElementById(`edit_${mid}`);
        this.editMessage(mid, el?.value || '');
      }

      relatedUser(index) {
        for (let i = Math.min(index, this.messages.length - 1); i >= 0; i--) {
          if (this.messages[i]?.role === 'user') return this.messages[i];
        }
        return null;
      }

      mid(m) {
        return m?.message_id || m?.id || '';
      }

      chartUrls(m) {
        const urls = m.chart_urls || [];
        if (!urls.length && m.chart_url) return [m.chart_url];
        return urls;
      }

      async downloadReport(index) {
        const msg = this.messages[index];
        if (!msg || !msg.content) return;
        try {
          const userQuestion = this.relatedUser(index)?.content || '';
          const chartUrls = this.chartUrls(msg);
          const report = await this.fetchJson(API.reports, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: 'Rapport d’analyse du tourisme',
              question: userQuestion,
              response: msg.content,
              confidence: msg.confidence,
              sources: msg.sources || [],
              chart_url: chartUrls[0] || '',
              chart_urls: chartUrls
            })
          });
          const a = document.createElement('a');
          a.href = report.download_url;
          a.download = '';
          document.body.appendChild(a);
          a.click();
          a.remove();
        } catch (e) {
          this.toast(`Rapport indisponible: ${e.message}`);
        }
      }

      publicText(value) {
        const hiddenBrand = 'STA' + 'TOUR';
        return String(value ?? '').replace(new RegExp(`\\b${hiddenBrand}\\b`, 'gi'), "Assistant d'analyse du tourisme");
      }

      renderMarkdown(text) {
        if (!text) return '';
        const clean = this.publicText(text);
        if (window.marked && window.DOMPurify) return DOMPurify.sanitize(marked.parse(clean));
        return this.esc(clean).replace(/\n/g, '<br>');
      }

      setLoading(v) {
        this.loading = v;
        const send = document.getElementById('sendBtn');
        send.disabled = v;
        send.classList.toggle('loading', v);
        send.textContent = v ? '' : '→';
      }

      toast(text) {
        const el = document.getElementById('toast');
        el.textContent = text;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3600);
      }

      esc(v) {
        return this.publicText(v).replace(/[&<>"']/g, ch => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
      }
    }

    const app = new TourismAnalysisChat();
    document.addEventListener('DOMContentLoaded', () => app.init());
  </script>
</body>
</html>
